<body>

<div class="scanline"></div>

<nav>
  <a href="index.html" class="nav-logo">

<main>
  <section class="page-header">
    <p class="section-label">// writing</p>
    <h1>Blog</h1>
    <p class="page-subtitle">Threat hunting walkthroughs, detection engineering, IR case studies, and more.</p>
  </section>

  <!-- FILTER TABS -->
  <section class="filter-bar">
    <button class="filter-btn active" data-tag="all">all</button>
    <button class="filter-btn" data-tag="threat-hunting">threat hunting</button>
    <button class="filter-btn" data-tag="detection-engineering">detection engineering</button>
    <button class="filter-btn" data-tag="incident-response">incident response</button>
    <button class="filter-btn" data-tag="tools">tools</button>
    <button class="filter-btn" data-tag="career">career</button>
  </section>

  <section class="blog-grid" id="blog-posts">
    <!-- Populated by posts.js -->
  </section>
</main>

<footer>
  <div class="footer-inner">
    <span class="footer-logo">~/kks</span>
    
    <div class="footer-links">
      <a href="mailto:work.kishan.in@gmail.com">Email</a>
      <a href="https://www.linkedin.com/in/singhkishan1/" target="_blank">LinkedIn</a>
      <a href="https://medium.com/@sudoEngineer" target="_blank">Medium</a>
    </div>
  </div>
</footer>

<script src="assets/posts.js"></script>
<script>
  const container = document.getElementById('blog-posts');

  function renderPosts(tag) {
    const filtered = tag === 'all' ? POSTS : POSTS.filter(p => p.tags.includes(tag));
    if (filtered.length === 0) {
      container.innerHTML = '<p class="empty-state">No posts yet in this category. Coming soon.</p>';
    } else {
      container.innerHTML = filtered.map(p => postCard(p)).join('');
    }
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderPosts(btn.dataset.tag);
    });
  });

  renderPosts('all');
</script>
</body>
</html>
