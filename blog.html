<script src="assets/posts.js"></script>
<script>
window.addEventListener('scroll', () => document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 40));
function render(tag) {
  const posts = tag === 'all' ? POSTS : POSTS.filter(p => p.tags.includes(tag));
  document.getElementById('blog-posts').innerHTML = posts.length ? posts.map(p => postCard(p)).join('') : '<p class="empty">No posts in this category yet.</p>';
}
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.tag);
  });
});
render('all');
</script>
