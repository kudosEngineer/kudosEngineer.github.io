    <div class="author-avatar-lg">KK</div>

<script src="assets/posts.js"></script>
<script>
window.addEventListener('scroll', () => document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 40));
const slug = new URLSearchParams(window.location.search).get('slug');
const post = POSTS.find(p => p.slug === slug);
const el = document.getElementById('post-content');
if (!post) {
  el.innerHTML = '<p class="empty">Post not found.</p>';
} else {
  document.getElementById('page-title').textContent = post.title + ' — Kishan Kumar Singh';
  el.innerHTML = `
    <header class="post-header">
      <div class="post-tags-row">${post.tags.map(t=>`<span class="filter-tag">${t.replace(/-/g,' ')}</span>`).join('')}</div>
      <h1 class="post-title">${post.title}</h1>
      <div class="post-meta"><span>${post.date}</span><span>${post.readTime} min read</span></div>
    </header>
    <div class="post-body">${post.content}</div>`;
}
</script>
</body>
</html>
